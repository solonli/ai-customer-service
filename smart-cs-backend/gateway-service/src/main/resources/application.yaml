server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: user-interaction-service
          uri: lb://user-interaction-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
        - id: dialogue-service
          uri: lb://dialogue-service
          predicates:
            - Path=/api/dialogue/**
          filters:
            - StripPrefix=1
        - id: knowledge-service
          uri: lb://knowledge-service
          predicates:
            - Path=/api/knowledge/**
          filters:
            - StripPrefix=1
        - id: nlu-service
          uri: lb://nlu-service
          predicates:
            - Path=/api/nlu/**
          filters:
            - StripPrefix=1
        - id: operation-service
          uri: lb://operation-service
          predicates:
            - Path=/api/operation/**
          filters:
            - StripPrefix=1
        - id: statistics-service
          uri: lb://statistics-service
          predicates:
            - Path=/api/statistics/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

knife4j:
  enable: true
  gateway:
    enable: true
    routes:
      - name: 认证服务
        service-name: auth-service
        location: /v3/api-docs
      - name: 用户交互服务
        service-name: user-interaction-service
        location: /v3/api-docs
      - name: 对话管理服务
        service-name: dialogue-service
        location: /v3/api-docs
      - name: 知识库服务
        service-name: knowledge-service
        location: /v3/api-docs
      - name: 智能处理服务
        service-name: nlu-service
        location: /v3/api-docs
      - name: 运营管理服务
        service-name: operation-service
        location: /v3/api-docs
      - name: 统计分析服务
        service-name: statistics-service
        location: /v3/api-docs

logging:
  level:
    com.smartcs: debug
    org.springframework.cloud.gateway: debug
